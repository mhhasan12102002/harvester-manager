<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harvester Pro</title>

<style>
body { font-family: Arial; padding: 10px; background:#f5f5f5; }
.card { background:white; padding:15px; margin:10px 0; border-radius:10px; }
input, button { width:100%; padding:12px; margin:5px 0; }
button { background:#28a745; color:white; border:none; }
</style>

</head>

<body>

<h2>🚜 Harvester Pro</h2>

<div class="card">
<input id="name" placeholder="নাম">
<input id="amount" placeholder="পরিমাণ">
<input id="rate" placeholder="রেট">
<input id="paid" placeholder="নগদ পেয়েছি">

<button onclick="save()">Save</button>
</div>

<div class="card">
<h3>📋 Customer List</h3>
<ul id="list"></ul>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAzlYbdNJMey9lGM1LBA6e3-HgSkFWV2TA",
  authDomain: "harvester-app-64764.firebaseapp.com",
  projectId: "harvester-app-64764",
  storageBucket: "harvester-app-64764.firebasestorage.app",
  messagingSenderId: "73768061791",
  appId: "1:73768061791:web:4d0448c26c7890774344ea"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.save = async function() {
  let name = document.getElementById("name").value;
  let amount = Number(document.getElementById("amount").value);
  let rate = Number(document.getElementById("rate").value);
  let paid = Number(document.getElementById("paid").value);

  if(!name || !amount || !rate){
    alert("সব তথ্য দাও");
    return;
  }

  let total = amount * rate;

  await addDoc(collection(db, "customers"), {
    name: name,
    amount: amount,
    rate: rate,
    paid: paid,
    total: total,
    due: total - paid,
    date: new Date().toLocaleDateString()
  });

  alert("Saved!");
  load();
}

async function load(){
  let snap = await getDocs(collection(db, "customers"));
  let html = "";

  snap.forEach(doc=>{
    let d = doc.data();
    html += `<li>${d.name} - ${d.total}৳ | বাকি: ${d.due}</li>`;
  });

  document.getElementById("list").innerHTML = html;
}

load();

</script>

</body>
</html>
